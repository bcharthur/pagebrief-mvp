name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive project
        run: tar -czf pagebrief-backend-pro.tar.gz .

      - name: Copy archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "pagebrief-backend-pro.tar.gz"
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy remotely
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p ${{ secrets.VPS_APP_DIR }}
            cd ${{ secrets.VPS_APP_DIR }}
            tar -xzf pagebrief-backend-pro.tar.gz
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
