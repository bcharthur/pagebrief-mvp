<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageBrief</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">PageBrief</p>
        <h1>Résumé utile en 1 clic</h1>
      </div>
      <span class="badge" id="pageKind">Page</span>
    </header>

    <label for="backendUrl">Backend</label>
    <input id="backendUrl" type="text" value="http://localhost:8080" />

    <label for="mode">Mode</label>
    <select id="mode">
      <option value="general">Général</option>
      <option value="dev">Développeur</option>
      <option value="sales">Commercial</option>
      <option value="buyer">Acheteur</option>
      <option value="legal">Juridique / Ops</option>
    </select>

    <div class="actions">
      <button id="inspectBtn">Analyser l'onglet actif</button>
    </div>

    <div id="status" class="status"></div>

    <section class="card">
      <h2>Résumé</h2>
      <div id="summary" class="list"></div>
    </section>

    <section class="grid-two">
      <section class="card compact">
        <h2>Actions</h2>
        <div id="actionsList" class="list"></div>
      </section>
      <section class="card compact">
        <h2>Risques / flous</h2>
        <div id="risksList" class="list"></div>
      </section>
    </section>

    <section class="card compact">
      <h2>TL;DR</h2>
      <p id="tldr" class="tldr">En attente…</p>
    </section>

    <section class="card compact metrics">
      <div>
        <span class="metric-label">Lecture estimée</span>
        <strong id="readingTime">-</strong>
      </div>
      <div>
        <span class="metric-label">Moteur</span>
        <strong id="engine">-</strong>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
