services:
  api:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:3b}
      LLM_ENABLED: ${LLM_ENABLED:-true}
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
